name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # This will be ghcr.io/<owner>/<repo>/sentiment-api
  IMAGE_NAME: ${{ github.repository }}/sentiment-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest httpx
      - name: Run unit tests
        run: python -m pytest tests/

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      
      - name: Create k8s Kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: test-cluster
      
      - name: Load Docker image into kind
        run: kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --name test-cluster
      
      - name: Deploy to Kubernetes
        run: |
          # Update image in deployment.yaml with the actual tag
          sed -i "s|image:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl rollout status deployment/sentiment-api --timeout=120s
      
      - name: Smoke test
        run: |
          kubectl port-forward svc/sentiment-api-svc 8000:80 &
          sleep 5
          curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"text":"I love Kubernetes!"}' | grep -q "POSITIVE"